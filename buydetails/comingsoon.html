<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coming Soon</title>

<style>
/* BACKGROUND */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1f3c88, #4facfe);
}

/* CARD */
.container {
  text-align: center;
  background: white;
  padding: 50px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  width: 90%;
  max-width: 400px;
}

/* TITLE */
h1 {
  color: #1f3c88;
  font-size: 40px;
  margin-bottom: 10px;
}

/* TEXT */
p {
  color: #333;
  margin: 5px 0;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #1f3c88;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #162c66;
}
</style>

</head>

<body>

<div class="container">
  <h1>Coming Soon</h1>
  <p>This feature is not available yet.</p>
  <p>We are working hard to bring it to you.</p>

  <a href="javascript:history.back()" class="btn">
    Go Back
  </a>
</div>

</body>
</html>
